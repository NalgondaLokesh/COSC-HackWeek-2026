<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storage Explorer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🗄️ Storage Explorer</h1>
      <button id="refreshBtn" title="Refresh">🔄</button>
    </header>

    <div class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Search entries..." />
      </div>
      <div class="filter-buttons">
        <button class="filter-btn active" data-type="all">All</button>
        <button class="filter-btn" data-type="localStorage">Local</button>
        <button class="filter-btn" data-type="sessionStorage">Session</button>
        <button class="filter-btn" data-type="cookies">Cookies</button>
      </div>
    </div>

    <div class="stats">
      <span id="totalCount">Total: 0 items</span>
      <span id="totalSize">Size: 0 B</span>
    </div>

    <div id="storageList" class="storage-list"></div>

    <div class="actions">
      <button id="clearAllBtn" class="danger">Clear All Storage</button>
      <button id="exportBtn">📥 Export Data</button>
      <button id="importBtn">📤 Import Data</button>
      <input type="file" id="fileInput" accept=".json" style="display: none;" />
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
