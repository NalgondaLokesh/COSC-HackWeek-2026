<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pikachu · pure CSS · refined</title>
  <style>
    /* ---------- reset & background ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1b3a4b 0%, #0e2a38 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    /* ---------- main pikachu ---------- */
    .pikachu {
      position: relative;
      width: 400px;
      height: 480px;
      background: #f7d44a;
      border-radius: 50% 50% 45% 45% / 55% 55% 40% 40%;
      box-shadow: 
        0 20px 30px -8px rgba(0,0,0,0.6),
        inset 0 -12px 0 #c49b2c,
        inset 0 8px 12px rgba(255, 245, 180, 0.5);
      transition: transform 0.2s ease;
    }

    /* ---------- ears (more accurate shape) ---------- */
    .ear-left,
    .ear-right {
      position: absolute;
      width: 64px;
      height: 88px;
      background: #f7d44a;
      top: -22px;
      z-index: 2;
      box-shadow: inset -6px -8px 0 #b37b2a, 0 4px 6px rgba(0,0,0,0.2);
      transform-origin: bottom center;
    }
    .ear-left {
      left: 12px;
      border-radius: 70% 20% 30% 40% / 80% 20% 40% 40%;
      transform: rotate(-22deg);
    }
    .ear-right {
      right: 12px;
      border-radius: 70% 20% 30% 40% / 80% 20% 40% 40%;
      transform: rotate(22deg) scaleX(-1);
    }
    /* black tips (more natural) */
    .ear-left::after,
    .ear-right::after {
      content: '';
      position: absolute;
      width: 44px;
      height: 34px;
      background: #1f1a0e;
      top: 4px;
      left: 6px;
      border-radius: 60% 20% 40% 40% / 50% 20% 40% 40%;
      box-shadow: inset -4px -4px 0 #0f0b05;
    }
    .ear-right::after {
      left: 12px;
      transform: scaleX(-1);
    }

    /* ---------- face container ---------- */
    .face {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* ----- eyes (bigger, more expressive) ----- */
    .eye-left,
    .eye-right {
      position: absolute;
      width: 44px;
      height: 48px;
      background: #1f1f1f;
      border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
      top: 78px;
      z-index: 5;
      box-shadow: inset 4px -6px 0 #3d3d3d, 0 6px 0 #0d0d0d;
    }
    .eye-left {
      left: 58px;
    }
    .eye-right {
      right: 58px;
    }
    /* eye shine (double highlight) */
    .eye-left::after,
    .eye-right::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 8px;
      left: 10px;
      box-shadow: 0 0 8px rgba(255,255,240,0.9);
      opacity: 0.95;
    }
    .eye-right::after {
      left: 14px;
    }
    /* secondary tiny shine */
    .eye-left::before,
    .eye-right::before {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.7);
      border-radius: 50%;
      top: 26px;
      left: 24px;
      box-shadow: 0 0 4px white;
    }
    .eye-right::before {
      left: 28px;
    }

    /* ----- cheeks (rounder, more vivid) ----- */
    .cheek-left,
    .cheek-right {
      position: absolute;
      width: 50px;
      height: 50px;
      background: #e74c3c;
      border-radius: 50%;
      top: 144px;
      box-shadow: 0 0 0 8px rgba(231, 76, 60, 0.2), inset 0 -4px 0 #a93226;
      z-index: 3;
    }
    .cheek-left {
      left: 12px;
    }
    .cheek-right {
      right: 12px;
    }

    /* ----- nose (tiny black triangle, centered) ----- */
    .nose {
      position: absolute;
      width: 14px;
      height: 12px;
      background: #1f1f1f;
      top: 126px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      border-radius: 2px 0 8px 0;
      z-index: 6;
      box-shadow: 0 2px 0 #0d0d0d;
    }

    /* ----- mouth (cute 'w' smile) ----- */
    .mouth {
      position: absolute;
      width: 70px;
      height: 30px;
      border-bottom: 6px solid #1f1f1f;
      border-radius: 0 0 50% 50% / 0 0 100% 100%;
      top: 148px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      background: transparent;
      box-shadow: 0 4px 0 #1f1f1f;
    }
    /* smile dimples (little curves) */
    .mouth::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 12px;
      border-bottom: 4px solid #1f1f1f;
      border-radius: 0 0 50% 50%;
      top: 12px;
      left: -22px;
      transform: rotate(-12deg);
      opacity: 0.4;
    }
    .mouth::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 12px;
      border-bottom: 4px solid #1f1f1f;
      border-radius: 0 0 50% 50%;
      top: 12px;
      right: -22px;
      transform: rotate(12deg);
      opacity: 0.4;
    }

    /* ---------- belly (lighter patch, more natural) ---------- */
    .belly {
      position: absolute;
      width: 170px;
      height: 150px;
      background: #fce68a;
      border-radius: 50% 50% 40% 40% / 60% 60% 30% 30%;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      opacity: 0.85;
      box-shadow: inset 0 -10px 0 #e6c45a, 0 0 0 2px rgba(255, 215, 0, 0.15);
      z-index: 0;
    }

    /* ---------- arms (chubby, rounded) ---------- */
    .arm-left,
    .arm-right {
      position: absolute;
      width: 48px;
      height: 68px;
      background: #f7d44a;
      border-radius: 40% 40% 40% 40% / 60% 60% 30% 30%;
      top: 214px;
      z-index: 2;
      box-shadow: inset -6px -8px 0 #c49b2c, 0 8px 0 #b68a2a;
      transform-origin: top center;
    }
    .arm-left {
      left: -16px;
      transform: rotate(28deg);
    }
    .arm-right {
      right: -16px;
      transform: rotate(-28deg) scaleX(-1);
    }
    /* fingers (tiny circles) */
    .arm-left::after,
    .arm-right::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      background: #f7d44a;
      border-radius: 50%;
      bottom: -4px;
      left: 4px;
      box-shadow: inset -4px -4px 0 #c49b2c;
    }
    .arm-right::after {
      left: 18px;
    }

    /* ---------- feet (sturdier, with sole detail) ---------- */
    .foot-left,
    .foot-right {
      position: absolute;
      width: 76px;
      height: 44px;
      background: #f7d44a;
      border-radius: 50% 50% 40% 40% / 60% 60% 30% 30%;
      bottom: -12px;
      z-index: 1;
      box-shadow: inset -4px -12px 0 #c49b2c, 0 12px 0 #b68a2a;
    }
    .foot-left {
      left: 26px;
      transform: rotate(-4deg);
    }
    .foot-right {
      right: 26px;
      transform: rotate(4deg);
    }
    /* sole pads (brownish) */
    .foot-left::after,
    .foot-right::after {
      content: '';
      position: absolute;
      width: 34px;
      height: 20px;
      background: #b37b2a;
      border-radius: 50%;
      bottom: 6px;
      left: 18px;
      opacity: 0.5;
      box-shadow: inset 0 0 0 2px #8b621f;
    }
    .foot-right::after {
      left: 22px;
    }

    /* ---------- tail (lightning bolt, more accurate) ---------- */
    .tail {
      position: absolute;
      width: 44px;
      height: 90px;
      background: #f7d44a;
      right: -36px;
      bottom: 48px;
      border-radius: 40% 40% 20% 20% / 80% 80% 20% 20%;
      transform: rotate(32deg) skewX(-6deg);
      box-shadow: inset 0 -10px 0 #c49b2c, 0 6px 0 #b68a2a;
      z-index: 0;
    }
    /* zig-zag segments */
    .tail::before {
      content: '';
      position: absolute;
      width: 40px;
      height: 36px;
      background: #f7d44a;
      top: -28px;
      right: 2px;
      border-radius: 60% 20% 40% 40% / 70% 20% 40% 40%;
      transform: rotate(20deg) skewX(8deg);
      box-shadow: inset 0 -6px 0 #c49b2c;
    }
    .tail::after {
      content: '';
      position: absolute;
      width: 32px;
      height: 30px;
      background: #f7d44a;
      top: -48px;
      right: 6px;
      border-radius: 70% 10% 20% 40% / 50% 20% 30% 40%;
      transform: rotate(16deg) skewX(10deg);
      box-shadow: inset 0 -4px 0 #c49b2c, 0 2px 0 #b68a2a;
    }
    /* brown tip (more defined) */
    .tail .tip {
      position: absolute;
      width: 30px;
      height: 26px;
      background: #b37b2a;
      top: -56px;
      right: 8px;
      border-radius: 60% 10% 30% 40% / 50% 10% 30% 40%;
      transform: rotate(8deg) skewX(6deg);
      box-shadow: inset 0 -4px 0 #8b621f, 0 0 0 1px #a06e26;
      z-index: 2;
    }

    /* ---------- extra detail: subtle cheek blush ---------- */
    .blush-left,
    .blush-right {
      position: absolute;
      width: 20px;
      height: 8px;
      background: rgba(200, 60, 50, 0.2);
      border-radius: 50%;
      top: 172px;
      z-index: 3;
      filter: blur(3px);
    }
    .blush-left {
      left: 6px;
      transform: rotate(-10deg);
    }
    .blush-right {
      right: 6px;
      transform: rotate(10deg);
    }

    /* ---------- ground shadow ---------- */
    .pikachu::after {
      content: '';
      position: absolute;
      width: 340px;
      height: 30px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.35) 0%, transparent 70%);
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      z-index: -1;
    }

    /* ---------- responsive ---------- */
    @media (max-width: 450px) {
      .pikachu {
        transform: scale(0.72);
        transform-origin: center;
      }
    }
    @media (max-width: 360px) {
      .pikachu {
        transform: scale(0.55);
        transform-origin: center;
      }
    }
  </style>
</head>
<body>
  <div class="pikachu">
    <!-- ears -->
    <div class="ear-left"></div>
    <div class="ear-right"></div>

    <!-- face -->
    <div class="face">
      <!-- eyes -->
      <div class="eye-left"></div>
      <div class="eye-right"></div>
      <!-- nose -->
      <div class="nose"></div>
      <!-- mouth -->
      <div class="mouth"></div>
      <!-- cheeks -->
      <div class="cheek-left"></div>
      <div class="cheek-right"></div>
      <!-- blush accents -->
      <div class="blush-left"></div>
      <div class="blush-right"></div>
    </div>

    <!-- belly -->
    <div class="belly"></div>

    <!-- arms -->
    <div class="arm-left"></div>
    <div class="arm-right"></div>

    <!-- feet -->
    <div class="foot-left"></div>
    <div class="foot-right"></div>

    <!-- tail with tip -->
    <div class="tail">
      <div class="tip"></div>
    </div>
  </div>
</body>
</html>
