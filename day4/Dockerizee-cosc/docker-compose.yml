version: '3.8'

services:
  document-qa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: document-qa-system
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PORT=${PORT:-8000}
      - MODEL_NAME=${MODEL_NAME:-llama-3.3-70b-versatile}
      - CHUNK_SIZE=${CHUNK_SIZE:-800}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-150}
      - TOP_K_RESULTS=${TOP_K_RESULTS:-3}
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
