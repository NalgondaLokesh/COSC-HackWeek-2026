<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ollama Chat · Local AI</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="brand-block">
                    <div class="logo">🧠 Ollama Chat</div>
                    <div class="brand-subtitle">Private local AI conversations</div>
                </div>
                <span class="status" id="connectionStatus">
                    <span class="dot" id="statusDot"></span>
                    <span id="statusText">Connecting...</span>
                </span>
            </div>
            <div class="header-right">
                <button class="btn btn-secondary" id="clearBtn" title="Clear chat history">
                    🗑️ Clear Chat
                </button>
                <button class="btn btn-secondary" id="modelBtn" title="Switch model">
                    📦 <span id="modelName">local-model</span>
                </button>
            </div>
        </header>

        <!-- Chat Messages -->
        <div class="chat-container" id="chatContainer">
            <div class="messages" id="messages">
                <div class="welcome-message">
                    <div class="welcome-icon">🧠</div>
                    <h2>Ollama Chat</h2>
                    <p>Chat privately with local models running through Ollama.</p>
                    <div class="welcome-hints">
                        <span>Try: “Summarize this text”</span>
                        <span>Model: <span id="welcomeModel">qwen2.5:7b</span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    id="messageInput"
                    placeholder="Ask anything locally..."
                    rows="1"
                    maxlength="4000"
                ></textarea>
                <button class="btn btn-primary" id="sendBtn">
                    <span>Send</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
            <div class="input-footer">
                <span>Press <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to send</span>
                <span id="charCount">0 / 4000</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
